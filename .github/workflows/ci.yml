name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run unit tests
      run: npm run test:unit

    - name: Run component tests
      run: npm run test:component

    - name: Run integration tests
      run: npm run test:integration

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Run E2E tests (send flow)
      run: npm run test:e2e -- --grep "Send Flow"

    - name: Run E2E tests (onboarding flow)
      run: npm run test:e2e -- --grep "@critical"

    - name: Run full E2E suite
      run: npm run test:e2e

  merge-analytics:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test

    steps:
    - name: Send merge analytics (issue-23, issue-28)
      run: |
        curl -X POST "${{ secrets.MERGE_ANALYTICS_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "event": "merge",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
            "author": "${{ github.actor }}",
            "issues": [23, 28],
            "status": "success",
            "coverage_verified": true
          }'